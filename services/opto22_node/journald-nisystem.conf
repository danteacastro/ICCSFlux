# NISystem journald configuration for groov EPIC/RIO
# Limits log storage to prevent flash wear
#
# Install location: /etc/systemd/journald.conf.d/nisystem.conf

[Journal]
# Maximum disk space for logs (50MB total)
SystemMaxUse=50M

# Maximum size of individual journal files (10MB)
SystemMaxFileSize=10M

# Keep logs for max 7 days
MaxRetentionSec=7day

# Compress logs to save space
Compress=yes

# Rate limiting to prevent log floods
RateLimitIntervalSec=30s
RateLimitBurst=1000

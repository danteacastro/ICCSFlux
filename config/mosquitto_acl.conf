# NISystem MQTT Access Control List
# Restricts who can publish to sensitive topics

# =============================================================================
# BACKEND SERVICE (full access)
# =============================================================================
user backend
topic readwrite #

# =============================================================================
# DASHBOARD CLIENT (controlled access)
# =============================================================================
user dashboard

# Can subscribe to everything (read data, status, etc.)
topic read nisystem/#

# Can publish to control topics (requires authentication)
topic write nisystem/nodes/+/system/acquire/start
topic write nisystem/nodes/+/system/acquire/stop
topic write nisystem/nodes/+/recording/start
topic write nisystem/nodes/+/recording/stop
topic write nisystem/nodes/+/output/set
topic write nisystem/nodes/+/alarm/acknowledge
topic write nisystem/nodes/+/alarm/reset
topic write nisystem/nodes/+/alarm/shelve
topic write nisystem/nodes/+/project/load
topic write nisystem/nodes/+/project/save

# Auth topics
topic write nisystem/auth/login
topic write nisystem/auth/logout
topic write nisystem/auth/status/request

# =============================================================================
# ANONYMOUS USERS (read-only, NO control access)
# =============================================================================
# Anonymous can subscribe to data for monitoring displays
topic read nisystem/nodes/+/channels/#
topic read nisystem/nodes/+/status/#
topic read nisystem/nodes/+/heartbeat
topic read nisystem/auth/status

# BLOCKED for anonymous (implicit deny):
# - nisystem/nodes/+/script/*      (code injection)
# - nisystem/nodes/+/output/set    (control outputs)
# - nisystem/users/*               (user management)
# - nisystem/nodes/+/system/*      (start/stop acquisition)

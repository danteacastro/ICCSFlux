# NISystem Mosquitto Configuration (Production)
# Auth credentials auto-generated on first run by scripts/mqtt_credentials.py
#
# To regenerate credentials: delete config/mqtt_credentials.json and restart.

# Per-listener settings: each listener has its own auth/ACL rules
per_listener_settings true

# =============================================================================
# LISTENER 1: MQTT TCP — for backend services and cRIO nodes
# =============================================================================
# Binds 0.0.0.0 to allow cRIO access over USB Ethernet.
# Requires authentication to prevent cross-talk between portable instances.
#
# For production with TLS: change to 127.0.0.1 and enable listener 2 below.

listener 1883 0.0.0.0
allow_anonymous false
password_file config/mosquitto_passwd
acl_file config/mosquitto_acl.conf

# =============================================================================
# LISTENER 2 (optional): MQTT TLS — for remote cRIO nodes
# =============================================================================
# Encrypted alternative to listener 1 for remote connections.
# Generate certs: python scripts/generate_tls_certs.py
# Then uncomment the block below and change listener 1 to 127.0.0.1.
#
# listener 8883 0.0.0.0
# cafile config/tls/ca.crt
# certfile config/tls/server.crt
# keyfile config/tls/server.key
# allow_anonymous false
# password_file config/mosquitto_passwd
# acl_file config/mosquitto_acl.conf

# =============================================================================
# LISTENER 2: WebSocket — for dashboard (localhost only)
# =============================================================================
# Binds 127.0.0.1 only. Anonymous access allowed because:
#   - Physical security: only processes on this PC can connect
#   - Dashboard is pre-built (Vite bakes env vars at compile time, but
#     credentials are generated at runtime on each target machine)
#   - App-level auth (useAuth) enforces user permissions in the dashboard

listener 9002 127.0.0.1
protocol websockets
allow_anonymous true

# =============================================================================
# LOGGING
# =============================================================================

log_dest stdout
log_type error
log_type warning
connection_messages false
log_timestamp true

# Connection settings
max_keepalive 120

# Maximum MQTT message payload size (bytes)
# 256KB is generous for JSON config payloads; prevents memory abuse
message_size_limit 262144

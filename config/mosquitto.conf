# NISystem Mosquitto Configuration (Production)
# Auth credentials auto-generated on first run by scripts/mqtt_credentials.py
#
# To regenerate credentials: delete config/mqtt_credentials.json and restart.
#
# SECURITY NOTE:
#   - MQTT TCP (1883): localhost-only, authenticated, unencrypted. For local
#     services only (DAQ service, Azure uploader on the same PC).
#   - MQTT TLS (8883): authenticated, TLS-encrypted. For all remote nodes
#     (cRIO, Opto22, GC). Certs generated by scripts/generate_tls_certs.py.
#   - WebSocket (9002): localhost-only, anonymous — dashboard uses app-level
#     auth (useAuth.ts). Loopback traffic not encrypted (no wire exposure).
#     Do NOT expose port 5173 or 9002 to the public internet without adding
#     a reverse proxy with TLS termination (nginx, Caddy, etc.).

# Per-listener settings: each listener has its own auth/ACL rules
per_listener_settings true

# =============================================================================
# LISTENER 1: MQTT TCP — local-only fallback (no TLS)
# =============================================================================
# Restricted to localhost. Only DAQ service and Azure uploader on this PC.
# Remote nodes (cRIO, Opto22, GC) MUST use TLS listener 2 below.

listener 1883 127.0.0.1
allow_anonymous false
password_file config/mosquitto_passwd
acl_file config/mosquitto_acl.conf

# =============================================================================
# LISTENER 2: MQTT TLS — for all remote nodes (cRIO, Opto22, GC)
# =============================================================================
# Encrypted MQTT for service-to-service traffic crossing a network.
# Generate certs: python scripts/generate_tls_certs.py
# Deploy CA cert to remote nodes via deploy scripts.

listener 8883 0.0.0.0
cafile config/tls/ca.crt
certfile config/tls/server.crt
keyfile config/tls/server.key
allow_anonymous false
password_file config/mosquitto_passwd
acl_file config/mosquitto_acl.conf

# =============================================================================
# LISTENER 3: WebSocket — for dashboard (localhost only)
# =============================================================================
# Binds 127.0.0.1 only. Anonymous access allowed because:
#   - Physical security: only processes on this PC can connect
#   - Dashboard is pre-built (Vite bakes env vars at compile time, but
#     credentials are generated at runtime on each target machine)
#   - App-level auth (useAuth) enforces user permissions in the dashboard

listener 9002 127.0.0.1
protocol websockets
allow_anonymous true

# =============================================================================
# LOGGING
# =============================================================================

log_dest stdout
log_type error
log_type warning
connection_messages false
log_timestamp true

# Connection settings
max_keepalive 120

# Maximum MQTT message payload size (bytes)
# Project autosave sends the full project state as a single message;
# large projects with P&ID data routinely exceed 256KB.
# 2MB accommodates growth while still preventing runaway payloads.
message_size_limit 2097152

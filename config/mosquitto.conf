# NISystem Mosquitto Configuration
# Enables both standard MQTT (1883) and WebSocket (9001) connections

# Standard MQTT listener on port 1883
listener 1883
protocol mqtt
allow_anonymous true

# WebSocket listener on port 9001 for browser clients
listener 9001
protocol websockets
allow_anonymous true

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

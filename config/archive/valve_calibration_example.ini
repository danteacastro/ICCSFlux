# =============================================================================
# VALVE CALIBRATION / FLOW SEQUENCER EXAMPLE
# =============================================================================
#
# This example configuration demonstrates:
# - Multiple solenoid valves controlled via digital outputs
# - Flow meters using counter inputs with pulse-to-GPM scaling
# - Interlock to limit concurrent open valves (max N at a time)
# - Safety action to close all valves on emergency
#
# Use Case: Sequential flow calibration where each valve opens until
# a target flow is measured, then closes and the next valve opens.
#
# =============================================================================

[system]
mqtt_broker = localhost
mqtt_port = 1883
mqtt_base_topic = nisystem
scan_rate_hz = 100
publish_rate_hz = 10
simulation_mode = true
log_directory = ./logs

# =============================================================================
# HARDWARE CONFIGURATION
# =============================================================================

[chassis:cDAQ-9189-Cal]
type = cDAQ-9189
serial = CAL001
description = Valve Calibration System Chassis
enabled = true

# Counter module for flow meters
[module:Slot1_Counters]
type = NI-9361
chassis = cDAQ-9189-Cal
slot = 1
description = Flow Meter Counter Inputs
enabled = true

# Digital outputs for solenoid valves
[module:Slot2_Valves]
type = NI-9472
chassis = cDAQ-9189-Cal
slot = 2
description = Solenoid Valve Control
enabled = true

# Digital inputs for valve position feedback (optional)
[module:Slot3_Feedback]
type = NI-9423
chassis = cDAQ-9189-Cal
slot = 3
description = Valve Position Feedback
enabled = true

# =============================================================================
# FLOW METER CHANNELS (Counter Inputs)
# =============================================================================
# Counter channels measure pulse frequency from flow meters
# Scaling: pulses_per_unit converts Hz to GPM
#
# Example calculation for a 100 pulses/gallon flow meter:
#   - At 100 Hz: (100 pulses/sec) / (100 pulses/gal) * 60 = 60 GPM
#   - Set pulses_per_unit = 100/60 = 1.667 to get GPM directly from Hz

[channel:Flow_Meter_1]
module = Slot1_Counters
physical_channel = ctr0
channel_type = counter
counter_mode = frequency
pulses_per_unit = 1.667
units = GPM
description = Flow Meter 1 (Valve 1 Line)
low_limit = 0
high_limit = 100
high_warning = 80
log = true
log_interval_ms = 500

[channel:Flow_Meter_2]
module = Slot1_Counters
physical_channel = ctr1
channel_type = counter
counter_mode = frequency
pulses_per_unit = 1.667
units = GPM
description = Flow Meter 2 (Valve 2 Line)
low_limit = 0
high_limit = 100
high_warning = 80
log = true
log_interval_ms = 500

[channel:Flow_Meter_3]
module = Slot1_Counters
physical_channel = ctr2
channel_type = counter
counter_mode = frequency
pulses_per_unit = 1.667
units = GPM
description = Flow Meter 3 (Valve 3 Line)
low_limit = 0
high_limit = 100
high_warning = 80
log = true
log_interval_ms = 500

[channel:Flow_Meter_4]
module = Slot1_Counters
physical_channel = ctr3
channel_type = counter
counter_mode = frequency
pulses_per_unit = 1.667
units = GPM
description = Flow Meter 4 (Valve 4 Line)
low_limit = 0
high_limit = 100
high_warning = 80
log = true
log_interval_ms = 500

# Totalizer channel - counts total gallons
[channel:Total_Flow]
module = Slot1_Counters
physical_channel = ctr4
channel_type = counter
counter_mode = count
pulses_per_unit = 100
units = Gallons
description = Total Flow (Cumulative)
log = true
log_interval_ms = 1000

# =============================================================================
# SOLENOID VALVE CHANNELS (Digital Outputs)
# =============================================================================
# Each valve has a safety_interlock to enforce "max N valves open" rule
# The interlock uses active_outputs(Valve_) to count open valves

[channel:Valve_1]
module = Slot2_Valves
physical_channel = do0
channel_type = digital_output
description = Solenoid Valve 1
default_state = false
# Interlock: Only allow opening if fewer than 2 valves are already open
safety_interlock = active_outputs(Valve_) < 2
safety_action = close_all_valves
log = true

[channel:Valve_2]
module = Slot2_Valves
physical_channel = do1
channel_type = digital_output
description = Solenoid Valve 2
default_state = false
safety_interlock = active_outputs(Valve_) < 2
safety_action = close_all_valves
log = true

[channel:Valve_3]
module = Slot2_Valves
physical_channel = do2
channel_type = digital_output
description = Solenoid Valve 3
default_state = false
safety_interlock = active_outputs(Valve_) < 2
safety_action = close_all_valves
log = true

[channel:Valve_4]
module = Slot2_Valves
physical_channel = do3
channel_type = digital_output
description = Solenoid Valve 4
default_state = false
safety_interlock = active_outputs(Valve_) < 2
safety_action = close_all_valves
log = true

# Master enable for entire valve system
[channel:System_Enable]
module = Slot2_Valves
physical_channel = do4
channel_type = digital_output
description = Master Valve System Enable
default_state = false
log = true

# =============================================================================
# SAFETY/STATUS INPUTS (Digital Inputs)
# =============================================================================

[channel:E_Stop]
module = Slot3_Feedback
physical_channel = di0
channel_type = digital_input
description = Emergency Stop (NC)
invert = true
safety_action = emergency_stop
log = true

[channel:Water_Supply_OK]
module = Slot3_Feedback
physical_channel = di1
channel_type = digital_input
description = Water Supply Pressure OK
safety_action = close_all_valves
log = true

[channel:System_Ready]
module = Slot3_Feedback
physical_channel = di2
channel_type = digital_input
description = System Ready Indicator
log = true

# =============================================================================
# SAFETY ACTIONS
# =============================================================================

[safety_action:emergency_stop]
description = EMERGENCY STOP - Close all valves and disable system
actions = Valve_1:false, Valve_2:false, Valve_3:false, Valve_4:false, System_Enable:false
trigger_alarm = true
alarm_message = Emergency stop activated - all valves closed

[safety_action:close_all_valves]
description = Close all solenoid valves
actions = Valve_1:false, Valve_2:false, Valve_3:false, Valve_4:false
trigger_alarm = false

# =============================================================================
# USAGE NOTES
# =============================================================================
#
# 1. INTERLOCK EXPRESSIONS:
#    The safety_interlock field supports these functions:
#    - active_outputs() - count all active digital outputs
#    - active_outputs(Valve_) - count active outputs matching pattern
#    - sum(ch1, ch2) - sum of channel values
#
#    Example interlocks:
#    - "active_outputs(Valve_) < 2" - max 1 valve open
#    - "active_outputs(Valve_) <= 3" - max 3 valves open
#    - "E_Stop == true AND Water_Supply_OK == true" - safety conditions
#
# 2. SEQUENCE EXAMPLE (for ScriptsTab):
#    To run a calibration sequence, create a script with:
#
#    Step 1: SetOutput - Valve_1 = true
#    Step 2: Wait - Flow_Meter_1 >= 50 (timeout: 30s)
#    Step 3: SetOutput - Valve_1 = false
#    Step 4: Wait - 2 seconds
#    Step 5: SetOutput - Valve_2 = true
#    Step 6: Wait - Flow_Meter_2 >= 50 (timeout: 30s)
#    ... and so on
#
# 3. UI BUTTON CONFIGURATION:
#    Create ActionButtonWidgets for manual valve control:
#    - Type: digital_output
#    - Channel: Valve_1 (etc.)
#    - PulseMs: 0 (toggle mode) or set for timed pulse
#    - RequireConfirmation: true (recommended)
#
#    Buttons will be blocked when:
#    - Interlock conditions not met (too many valves open)
#    - System is acquiring and sequence is running
#
# 4. COUNTER SCALING:
#    For a flow meter with K pulses per gallon:
#    - For GPM output: pulses_per_unit = K / 60
#    - For L/min output: pulses_per_unit = K / 60 * 3.785
#    - For count mode: pulses_per_unit = K (gives total gallons)
#

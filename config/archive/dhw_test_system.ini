# =============================================================================
# TOTALIZERS - Created via Playground User Variables
# =============================================================================
# Totalizers (Ifm_tot, NGin_tot, etc.) should be created in the Playground
# as "accumulator" type user variables linked to the source channels.
# They persist across restarts and can be reset manually or on schedule.
#
# Example Playground variable setup:
# - Name: Ifm_tot
# - Type: accumulator
# - Source Channel: Ifm
# - Units: gal
# - Scale Factor: 1/60 (to convert GPM*seconds to gallons)
# - Reset Mode: test_session (reset when test starts)
# =============================================================================

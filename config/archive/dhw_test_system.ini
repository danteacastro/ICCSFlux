physical_channel = ai8
channel_type = current
current_range_ma = 20.0
units = GPM
four_twenty_scaling = true
signal_min = 0.004
signal_max = 0.020
eng_units_min = 0.0
eng_units_max = 15.0
description = DHW Flow Rate - ifm

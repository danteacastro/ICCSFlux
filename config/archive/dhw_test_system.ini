# =============================================================================
# NISystem Configuration - DHW (Domestic Hot Water) Test System
# =============================================================================
# Test System: Water heater efficiency/performance test stand
# Based on: LabVIEW configuration from 23875 UEF-FHR project
# Hardware: cDAQ-9189 with thermocouple, RTD, analog I/O, and digital I/O modules
# =============================================================================

[system]
mqtt_broker = localhost
mqtt_port = 1883
mqtt_base_topic = nisystem
scan_rate_hz = 20
publish_rate_hz = 4
simulation_mode = true
log_directory = ./logs
config_reload_topic = nisystem/config/reload
system_name = 23875 UEF-FHR DHW Test System
system_id = DHW-001
datalog_rate_ms = 5000
datalog_rearm = true
datalog_rearm_rate_sec = 3600

# =============================================================================
# CHASSIS
# =============================================================================
[chassis:cDAQ9189-Main]
type = cDAQ-9189
serial = 241B4D9
connection = USB
description = Main 8-Slot CompactDAQ Chassis
enabled = true

# =============================================================================
# MODULES
# =============================================================================

[module:Mod1_RTD]
type = NI-9217
chassis = cDAQ9189-Main
slot = 1
description = RTD Temperature Module (4ch)
enabled = true

[module:Mod2_Thermocouple]
type = NI-9213
chassis = cDAQ9189-Main
slot = 2
description = Thermocouple Module (16ch)
enabled = true

[module:Mod7_AnalogIn]
type = NI-9203
chassis = cDAQ9189-Main
slot = 7
description = Analog Input Module - 4-20mA/0-10V (8ch)
enabled = true

[module:Mod8_DigitalOut]
type = NI-9472
chassis = cDAQ9189-Main
slot = 8
description = Digital Output Module (8ch)
enabled = true

# =============================================================================
# RTD CHANNELS (Mod1 - NI-9217)
# =============================================================================

[channel:RTD_in]
module = Mod1_RTD
physical_channel = ai0
channel_type = rtd
rtd_type = Pt3851
resistance_config = 3Wire
excitation_current = 0.001
units = degF
description = City Water in RTD
low_limit = 0
high_limit = 200
log = true
log_interval_ms = 5000
precision = 3
group = Water Temps

[channel:RTD_out]
module = Mod1_RTD
physical_channel = ai1
channel_type = rtd
rtd_type = Pt3851
resistance_config = 3Wire
excitation_current = 0.001
units = degF
description = DHW Out RTD
low_limit = 0
high_limit = 200
log = true
log_interval_ms = 5000
precision = 3
group = Water Temps


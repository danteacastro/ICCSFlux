# =============================================================================
# SAFETY ACTIONS - Fail-Safe Philosophy
# =============================================================================
# All safety actions are designed to fail-safe:
# - Heaters OFF on any fault
# - Alarms ON to alert operators
# - N2 purge may activate to cool chambers
# =============================================================================

[safety_action:emergency_shutdown]
description = EMERGENCY STOP - Complete System Shutdown
actions = F1_Heater_Enable:false, F2_Heater_Enable:false, F1_N2_Purge:true, F2_N2_Purge:true, Alarm_Beacon:true, Alarm_Horn:true
trigger_alarm = true
alarm_message = EMERGENCY STOP ACTIVATED - All heaters disabled, N2 purge active

[safety_action:F1_overtemp]
description = Furnace 1 Software Over-temperature (from TC reading)
actions = F1_Heater_Enable:false, F1_N2_Purge:true, Alarm_Beacon:true
trigger_alarm = true
alarm_message = FURNACE 1 OVERTEMP (Software) - Heater OFF, N2 purge ON

[safety_action:F2_overtemp]
description = Furnace 2 Software Over-temperature (from TC reading)
actions = F2_Heater_Enable:false, F2_N2_Purge:true, Alarm_Beacon:true
trigger_alarm = true
alarm_message = FURNACE 2 OVERTEMP (Software) - Heater OFF, N2 purge ON

[safety_action:F1_overtemp_hw]
description = Furnace 1 Hardware Over-temperature Switch Tripped
actions = F1_Heater_Enable:false, F1_N2_Purge:true, Alarm_Beacon:true, Alarm_Horn:true
trigger_alarm = true
alarm_message = FURNACE 1 OVERTEMP (Hardware Switch) - CRITICAL - Check immediately

[safety_action:F2_overtemp_hw]
description = Furnace 2 Hardware Over-temperature Switch Tripped
actions = F2_Heater_Enable:false, F2_N2_Purge:true, Alarm_Beacon:true, Alarm_Horn:true
trigger_alarm = true
alarm_message = FURNACE 2 OVERTEMP (Hardware Switch) - CRITICAL - Check immediately

[safety_action:F1_door_open]
description = Furnace 1 Door Opened - Pause Heating for Safety
actions = F1_Heater_Enable:false
trigger_alarm = false
alarm_message = Furnace 1 door opened - heating paused

[safety_action:F2_door_open]
description = Furnace 2 Door Opened - Pause Heating for Safety
actions = F2_Heater_Enable:false
trigger_alarm = false
alarm_message = Furnace 2 door opened - heating paused

[safety_action:F1_low_cooling]
description = Furnace 1 Low Cooling Water Flow - Prevent Overheating
actions = F1_Heater_Enable:false, Alarm_Beacon:true
trigger_alarm = true
alarm_message = FURNACE 1 LOW COOLING FLOW - Heater disabled to prevent damage

[safety_action:F2_low_cooling]
description = Furnace 2 Low Cooling Water Flow - Prevent Overheating
actions = F2_Heater_Enable:false, Alarm_Beacon:true
trigger_alarm = true
alarm_message = FURNACE 2 LOW COOLING FLOW - Heater disabled to prevent damage

[safety_action:low_water_pressure]
description = System Cooling Water Pressure Low - Both Furnaces Affected
actions = F1_Heater_Enable:false, F2_Heater_Enable:false, Alarm_Beacon:true
trigger_alarm = true
alarm_message = LOW WATER PRESSURE - All heaters disabled, check water supply

[safety_action:water_flow_loss]
description = Cooling Water Flow Switch Lost - Critical Cooling Failure
actions = F1_Heater_Enable:false, F2_Heater_Enable:false, F1_N2_Purge:true, F2_N2_Purge:true, Alarm_Beacon:true, Alarm_Horn:true
trigger_alarm = true
alarm_message = COOLING WATER FLOW LOST - CRITICAL - All heaters OFF, N2 purge ON

[safety_action:low_n2_pressure]
description = Low Nitrogen Supply Pressure - May Affect Purge Capability
actions = Alarm_Beacon:true
trigger_alarm = true
alarm_message = LOW N2 SUPPLY PRESSURE - Check nitrogen supply

[safety_action:low_exhaust_flow]
description = Low Exhaust Ventilation - Fume Hazard
actions = F1_Heater_Enable:false, F2_Heater_Enable:false, Alarm_Beacon:true
trigger_alarm = true
alarm_message = LOW EXHAUST FLOW - Heaters disabled, check ventilation fan

[safety_action:air_pressure_loss]
description = Compressed Air Pressure Lost - Pneumatic Systems Affected
actions = Alarm_Beacon:true
trigger_alarm = true
alarm_message = COMPRESSED AIR PRESSURE LOST - Check air supply

[safety_action:F1_high_pressure]

# =============================================================================
# NISystem Configuration - System Settings
# =============================================================================
# This file contains system-wide settings (MQTT, logging, etc.)
# Channel definitions are stored in project JSON files.
# =============================================================================

[system]
mqtt_broker = localhost
mqtt_port = 1884
mqtt_base_topic = nisystem
scan_rate_hz = 20
publish_rate_hz = 4
simulation_mode = false
log_directory = ./logs
config_reload_topic = nisystem/config/reload

# =============================================================================
# SERVICE MANAGEMENT
# =============================================================================

[service]
heartbeat_interval_sec = 2.0
health_timeout_sec = 10.0
shutdown_timeout_sec = 10.0
command_ack_timeout_sec = 5.0

[mosquitto]
auto_start = true
executable = mosquitto
port = 1883

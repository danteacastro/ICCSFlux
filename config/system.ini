# =============================================================================
# NISystem Configuration - System Settings
# =============================================================================
# This file contains system-wide settings (MQTT, logging, etc.)
# Channel definitions are stored in project JSON files.
# =============================================================================

[system]
mqtt_broker = localhost
mqtt_port = 1884
mqtt_base_topic = nisystem
scan_rate_hz = 20
publish_rate_hz = 4
simulation_mode = false
log_directory = ./logs
config_reload_topic = nisystem/config/reload

# =============================================================================
# SERVICE MANAGEMENT
# =============================================================================

[service]
heartbeat_interval_sec = 2.0
health_timeout_sec = 10.0
shutdown_timeout_sec = 10.0
command_ack_timeout_sec = 5.0

[mosquitto]
auto_start = true
executable = mosquitto
port = 1883

# =============================================================================
# LOGGING - Prevents disk exhaustion over long-term operation
# =============================================================================

[logging]
level = INFO
max_file_size_mb = 50
backup_count = 3

# =============================================================================
# WATCHDOG - External safety monitor (run as separate process)
# Start with: python services/daq_service/watchdog.py -c config/system.ini
# =============================================================================

[watchdog]
heartbeat_timeout_sec = 10.0
check_interval_sec = 2.0
restart_service = true
service_name = daq_service

# =============================================================================
# NISystem Configuration - DHW (Domestic Hot Water) Test System
# =============================================================================
# Test System: Water heater efficiency/performance test stand
# Based on: LabVIEW configuration from 23875 UEF-FHR project
# Hardware: cDAQ-9189 with thermocouple, RTD, analog I/O, and digital I/O modules
# =============================================================================

[system]
mqtt_broker = localhost
mqtt_port = 1883
mqtt_base_topic = nisystem
scan_rate_hz = 20
publish_rate_hz = 4
simulation_mode = true
log_directory = ./logs
config_reload_topic = nisystem/config/reload
system_name = 23875 UEF-FHR DHW Test System
system_id = DHW-001
datalog_rate_ms = 5000
datalog_rearm = true
datalog_rearm_rate_sec = 3600

# =============================================================================
# SERVICE MANAGEMENT
# =============================================================================

[service]
heartbeat_interval_sec = 2.0
health_timeout_sec = 10.0
shutdown_timeout_sec = 10.0
command_ack_timeout_sec = 5.0

[mosquitto]
auto_start = true
executable = mosquitto
port = 1883

# =============================================================================
# RTD CHANNELS (Mod1 - NI-9217)
# =============================================================================

[channel:RTD_in]
physical_channel = cDAQ9189-241B4D9Mod1/ai0
channel_type = rtd
rtd_type = Pt3851
resistance_config = 3Wire
excitation_current = 0.001
units = degF
description = City Water in RTD
low_limit = 0
high_limit = 200
log = true
log_interval_ms = 5000
precision = 3
group = Water Temps

[channel:RTD_out]
physical_channel = cDAQ9189-241B4D9Mod1/ai1
channel_type = rtd
rtd_type = Pt3851
resistance_config = 3Wire
excitation_current = 0.001
units = degF
description = DHW Out RTD
low_limit = 0
high_limit = 200
log = true
log_interval_ms = 5000
precision = 3
group = Water Temps


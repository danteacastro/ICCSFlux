# =============================================================================
# NISystem Configuration - DHW Test System (NI MAX Simulated Devices)
# =============================================================================
# This configuration uses NI MAX simulated cDAQ-9189 chassis.
#
# To use this config:
#   1. Create simulated cDAQ-9189 in NI MAX named "cDAQ-9189-DHWSIM"
#   2. Add modules to slots 1, 2, 7, 8
#   3. Start the DAQ service with: python services/daq_service/daq_service.py -c config/dhw_test_system_nimax_sim.ini
#
# Hardware (Simulated in NI MAX):
#   - cDAQ-9189-DHWSIM: Main chassis
#   - Mod1: NI-9217 (4-ch RTD)
#   - Mod2: NI-9213 (16-ch Thermocouple)
#   - Mod7: NI-9203 (8-ch Current Input)
#   - Mod8: NI-9472 (8-ch Digital Output)
# =============================================================================

# NOTE: System settings (MQTT, logging, etc.) are loaded from config/system.ini
# This file only contains hardware/channel configuration for this specific project.

# =============================================================================
# CHASSIS (Simulated in NI MAX)
# =============================================================================
[chassis:cDAQ-9189-DHWSIM]
type = cDAQ-9189
serial = 0
connection = USB
description = Simulated 8-Slot CompactDAQ Chassis
enabled = true

# =============================================================================
# SIMULATED MODULES (in NI MAX chassis)
# =============================================================================

[module:Mod1_RTD]
type = NI-9217
chassis = cDAQ-9189-DHWSIM
slot = 1
description = RTD Temperature Module (4ch) - Simulated
enabled = true

[module:Mod2_Thermocouple]
type = NI-9213
chassis = cDAQ-9189-DHWSIM
slot = 2
description = Thermocouple Module (16ch) - Simulated
enabled = true

[module:Mod7_AnalogIn]
type = NI-9203
chassis = cDAQ-9189-DHWSIM
slot = 7
description = Analog Current Input Module (8ch) - Simulated
enabled = true

[module:Mod8_DigitalOut]
type = NI-9472
chassis = cDAQ-9189-DHWSIM
slot = 8
description = Digital Output Module (8ch) - Simulated
enabled = true

# =============================================================================
# RTD CHANNELS (Mod1 - NI-9217)
# Physical channels: cDAQ-9189-DHWSIMMod1/ai0-ai3
# =============================================================================

[channel:RTD_in]
module = Mod1_RTD
physical_channel = ai0
channel_type = rtd
rtd_type = Pt3851
resistance_config = 3Wire
excitation_current = 0.001
units = degF
description = City Water in RTD
low_limit = 0
high_limit = 200
log = true
log_interval_ms = 5000
precision = 3
group = Water Temps

[channel:RTD_out]
module = Mod1_RTD
physical_channel = ai1
channel_type = rtd
rtd_type = Pt3851
resistance_config = 3Wire
excitation_current = 0.001
units = degF
description = DHW Out RTD
low_limit = 0
high_limit = 200
log = true
log_interval_ms = 5000
precision = 3
group = Water Temps


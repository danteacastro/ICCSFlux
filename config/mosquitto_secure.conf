# NISystem Mosquitto Configuration (SECURED)
# Enables authentication and ACL for production use

# =============================================================================
# LISTENERS
# =============================================================================

# Standard MQTT listener (for backend service)
listener 1884 127.0.0.1
protocol mqtt

# WebSocket listener (for dashboard)
listener 9002 0.0.0.0
protocol websockets

# =============================================================================
# SECURITY
# =============================================================================

# Disable anonymous access
allow_anonymous false

# Password file (generated by setup_mqtt_security.bat)
password_file C:/Users/User/Documents/Projects/NISystem/config/mosquitto_passwd

# Access Control List
acl_file C:/Users/User/Documents/Projects/NISystem/config/mosquitto_acl.conf

# =============================================================================
# PERSISTENCE & LOGGING
# =============================================================================

persistence true
persistence_location C:/Users/User/Documents/Projects/NISystem/data/mosquitto/

log_dest stdout
log_type error
log_type warning
log_type notice

# Connection settings
max_keepalive 120

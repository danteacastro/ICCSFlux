# =============================================================================
# cRIO Service Configuration
# =============================================================================
# This service runs on the cRIO-905x Linux RT system and provides:
# - Digital I/O (E-stops, interlocks, relays, indicators)
# - Safety logic with watchdog monitoring
# - MQTT communication with the main NISystem
#
# Future expansion:
# - Analog I/O for additional measurements
# - Counter/timer channels
# - Custom protocols
# - FPGA integration
# =============================================================================

[system]
# MQTT broker - typically the main NISystem PC
mqtt_broker = 192.168.1.100
mqtt_port = 1883
mqtt_base_topic = nisystem

# cRIO identification
crio_id = crio-001
crio_name = cRIO Controller

# Scan rate for digital I/O (Hz)
scan_rate_hz = 4

# Heartbeat interval (seconds)
heartbeat_interval_sec = 1.0

# Watchdog settings - if no heartbeat from main system, trigger safety
pc_watchdog_timeout_sec = 5.0
pc_heartbeat_topic = nisystem/heartbeat

# Safety behavior on communication loss
safety_on_disconnect = true


[service]
# Health monitoring
health_timeout_sec = 10.0
shutdown_timeout_sec = 5.0

# Logging
log_level = INFO
log_directory = /var/log/crio_service


# =============================================================================
# DIGITAL INPUT CHANNELS
# =============================================================================
# Configure digital inputs for safety monitoring
# Each input can trigger safety actions when activated
#
# Parameters:
#   physical_channel  - NI-DAQmx channel (e.g., cRIO-905x/Mod1/port0/line0)
#   description       - Human-readable description
#   active_state      - Which state triggers action: high (1) or low (0)
#   debounce_ms       - Debounce time to filter noise
#   safety_action     - Action to take: none, warn, stop_acquisition, emergency_stop
#   trigger_alarm     - Create alarm in main system
#   alarm_severity    - Severity: critical, high, medium, low
# =============================================================================

[di:estop_main]
physical_channel = cRIO-905x/Mod1/port0/line0
description = Main E-Stop Button
active_state = low
debounce_ms = 50
safety_action = emergency_stop
trigger_alarm = true
alarm_severity = critical
alarm_message = EMERGENCY STOP ACTIVATED

[di:estop_remote]
physical_channel = cRIO-905x/Mod1/port0/line1
description = Remote E-Stop Button
active_state = low
debounce_ms = 50
safety_action = emergency_stop
trigger_alarm = true
alarm_severity = critical
alarm_message = REMOTE EMERGENCY STOP ACTIVATED

[di:door_interlock]
physical_channel = cRIO-905x/Mod1/port0/line2
description = Enclosure Door Interlock
active_state = low
debounce_ms = 100
safety_action = stop_acquisition
trigger_alarm = true
alarm_severity = high
alarm_message = Enclosure door opened - acquisition stopped

[di:high_temp_switch]
physical_channel = cRIO-905x/Mod1/port0/line3
description = High Temperature Limit Switch
active_state = high
debounce_ms = 200
safety_action = emergency_stop
trigger_alarm = true
alarm_severity = critical
alarm_message = HIGH TEMPERATURE LIMIT EXCEEDED

[di:low_pressure_switch]
physical_channel = cRIO-905x/Mod1/port0/line4
description = Low Pressure Safety Switch
active_state = low
debounce_ms = 500
safety_action = warn
trigger_alarm = true
alarm_severity = medium
alarm_message = Low pressure detected

[di:flow_switch]
physical_channel = cRIO-905x/Mod1/port0/line5
description = Cooling Flow Switch
active_state = low
debounce_ms = 1000
safety_action = warn
trigger_alarm = true
alarm_severity = medium
alarm_message = Cooling flow below minimum


# =============================================================================
# DIGITAL OUTPUT CHANNELS
# =============================================================================
# Configure digital outputs for safety control
# Outputs can be commanded from the main system or set by safety logic
#
# Parameters:
#   physical_channel  - NI-DAQmx channel
#   description       - Human-readable description
#   default_state     - State on startup and after safety event: high or low
#   safety_state      - State when safety event occurs: high or low
#   allow_remote      - Allow main system to control this output
# =============================================================================

[do:heater_enable]
physical_channel = cRIO-905x/Mod2/port0/line0
description = Heater Enable Relay
default_state = low
safety_state = low
allow_remote = true

[do:pump_enable]
physical_channel = cRIO-905x/Mod2/port0/line1
description = Pump Enable Relay
default_state = low
safety_state = low
allow_remote = true

[do:valve_main]
physical_channel = cRIO-905x/Mod2/port0/line2
description = Main Isolation Valve
default_state = low
safety_state = low
allow_remote = true

[do:alarm_beacon]
physical_channel = cRIO-905x/Mod2/port0/line3
description = Alarm Beacon Light
default_state = low
safety_state = high
allow_remote = true

[do:alarm_horn]
physical_channel = cRIO-905x/Mod2/port0/line4
description = Alarm Horn
default_state = low
safety_state = high
allow_remote = true

[do:system_ready]
physical_channel = cRIO-905x/Mod2/port0/line5
description = System Ready Indicator
default_state = low
safety_state = low
allow_remote = false


# =============================================================================
# SAFETY ACTIONS
# =============================================================================
# Define what happens for each safety action type
# These actions set digital outputs to their safety states
# =============================================================================

[safety_action:emergency_stop]
description = Emergency Stop - All outputs to safe state
outputs = heater_enable, pump_enable, valve_main
enable_beacon = true
enable_horn = true
horn_duration_sec = 5.0
notify_main_system = true
require_manual_reset = true

[safety_action:stop_acquisition]
description = Stop data acquisition safely
outputs = heater_enable
enable_beacon = true
enable_horn = false
notify_main_system = true
require_manual_reset = false

[safety_action:warn]
description = Warning only - no output changes
outputs =
enable_beacon = false
enable_horn = false
notify_main_system = true
require_manual_reset = false


# =============================================================================
# INTERLOCK GROUPS
# =============================================================================
# Define logical groups of interlocks that must all be satisfied
# for certain operations to be permitted
# =============================================================================

[interlock_group:heater_permissive]
description = Conditions required to enable heater
required_inputs = estop_main, estop_remote, door_interlock, flow_switch
controls_output = heater_enable

[interlock_group:pump_permissive]
description = Conditions required to enable pump
required_inputs = estop_main, estop_remote
controls_output = pump_enable

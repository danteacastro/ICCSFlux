# =============================================================================
# MODBUS CONFIGURATION EXAMPLE
# =============================================================================
# This file shows how to configure Modbus TCP and RTU devices in NISystem.
# Copy the relevant sections to your system.ini and modify as needed.
# =============================================================================

# =============================================================================
# MODBUS TCP DEVICE (PLC over Ethernet)
# =============================================================================
# Supported PLCs: Schneider M241/M340/M580, Allen-Bradley, Siemens, etc.

[chassis:PLC_Main]
type = modbus_plc
connection = tcp
ip_address = 192.168.1.100
port = 502
description = Main PLC - Schneider M241
enabled = true

[module:ModbusRegs]
type = modbus_device
chassis = PLC_Main
slot = 1
description = PLC Holding Registers (slave ID = 1)
enabled = true

# =============================================================================
# MODBUS RTU DEVICE (Serial RS-485)
# =============================================================================
# For legacy devices connected via RS-485 serial

[chassis:RTU_Gateway]
type = modbus_gateway
connection = rtu
serial = /dev/ttyUSB0
description = Modbus RTU Gateway
enabled = true
# Note: baudrate, parity, stopbits configured in modbus_reader defaults
# Default: 9600 baud, Even parity, 1 stop bit

[module:RTU_Device1]
type = modbus_device
chassis = RTU_Gateway
slot = 1
description = RTU Device at address 1
enabled = true

# =============================================================================
# MODBUS REGISTER CHANNELS (Analog Values)
# =============================================================================

# Reading a temperature from PLC register 100 (float32, big-endian)
[channel:PLC_Temp1]
module = ModbusRegs
physical_channel = modbus:holding:100
channel_type = modbus_register
modbus_register_type = holding
modbus_address = 100
modbus_data_type = float32
modbus_byte_order = big
modbus_word_order = big
modbus_scale = 1.0
modbus_offset = 0.0
units = degC
description = Temperature from PLC
low_limit = 0
high_limit = 150
log = true
log_interval_ms = 1000
group = PLC Data

# Reading a pressure from PLC input register 200 (int16 with scaling)
[channel:PLC_Pressure]
module = ModbusRegs
physical_channel = modbus:input:200
channel_type = modbus_register
modbus_register_type = input
modbus_address = 200
modbus_data_type = int16
modbus_byte_order = big
modbus_scale = 0.01
modbus_offset = 0.0
units = bar
description = Pressure from PLC (raw * 0.01 = bar)
low_limit = 0
high_limit = 10
log = true
group = PLC Data

# Reading a flow rate from PLC (uint32, little-endian words)
[channel:PLC_Flow]
module = ModbusRegs
physical_channel = modbus:holding:300
channel_type = modbus_register
modbus_register_type = holding
modbus_address = 300
modbus_data_type = uint32
modbus_byte_order = big
modbus_word_order = little
modbus_scale = 0.001
modbus_offset = 0.0
units = L/min
description = Flow rate (word-swapped uint32)
log = true
group = PLC Data

# =============================================================================
# MODBUS COIL CHANNELS (Digital I/O)
# =============================================================================

# Reading a pump status from coil 50
[channel:Pump_Status]
module = ModbusRegs
physical_channel = modbus:coil:50
channel_type = modbus_coil
modbus_register_type = coil
modbus_address = 50
description = Pump Running Status
group = PLC Status

# Writing to a pump enable coil
[channel:Pump_Enable]
module = ModbusRegs
physical_channel = modbus:coil:100
channel_type = modbus_coil
modbus_register_type = coil
modbus_address = 100
description = Pump Enable Command
default_state = false
group = PLC Control

# Reading discrete input (read-only status bit)
[channel:Door_Switch]
module = ModbusRegs
physical_channel = modbus:discrete:10
channel_type = modbus_coil
modbus_register_type = discrete
modbus_address = 10
description = Door Closed Switch
group = PLC Status

# =============================================================================
# MODBUS DATA TYPES REFERENCE
# =============================================================================
# modbus_data_type options:
#   int16   - Signed 16-bit integer (1 register)
#   uint16  - Unsigned 16-bit integer (1 register)
#   int32   - Signed 32-bit integer (2 registers)
#   uint32  - Unsigned 32-bit integer (2 registers)
#   float32 - IEEE 754 single precision float (2 registers)
#   float64 - IEEE 754 double precision float (4 registers)
#   bool    - Boolean (uses register value != 0)
#
# modbus_register_type options:
#   holding  - Read/Write registers (function codes 3, 6, 16)
#   input    - Read-only registers (function code 4)
#   coil     - Read/Write bits (function codes 1, 5, 15)
#   discrete - Read-only bits (function code 2)
#
# modbus_byte_order / modbus_word_order:
#   big    - Big-endian (most significant byte/word first)
#   little - Little-endian (least significant byte/word first)
#
# Scaling formula: scaled_value = raw_value * modbus_scale + modbus_offset
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short `
            --ignore=tests/test_crio_integration.py `
            --ignore=tests/test_comprehensive_system.py `
            --ignore=tests/test_lab_experiment.py

  dashboard-tests:
    name: Dashboard Tests (Vue/TypeScript)
    runs-on: windows-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build dashboard
        run: npm run build

  build-portable:
    name: Build Portable Package
    runs-on: windows-latest
    needs: [backend-tests, dashboard-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard

      - name: Download vendor dependencies
        run: python scripts/download_dependencies.py

      - name: Build portable package
        run: python scripts/build_portable.py --offline

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ICCSFlux-Portable
          path: dist/ICCSFlux-Portable/
          retention-days: 30
